<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navbar-->
  <header class="navbar-header">
    <nav class="navbar">
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Tri</a>
        <a href="{{ '/projects.html' | relative_url }}" class="nav-link {% if page.url contains 'projects' %}active{% endif %}">Projects</a>
        <a href="{{ '/publications.html' | relative_url }}" class="nav-link {% if page.url contains 'publications' %}active{% endif %}">Publications</a>
      </div>
    </nav>
  </header>

  <!-- Main container -->
  <main class="container">
    
    <!-- Sidebar thông tin cá nhân -->
    <aside class="sidebar">
      <div class="profile-card">
        <!-- Ảnh đại diện -->
        <img src="{{ '/assets/images/avatar.jpg' | relative_url }}" alt="Profile Photo" class="avatar">
        
        <!-- Tên và mô tả ngắn -->
        <h2 class="profile-name">Tri M. Ngo</h2>
        <p class="profile-title">Student at UIT,<br>Ho Chi Minh, Vietnam.</p>
        
        <!-- Danh sách liên kết với các icon SVG hiện đại -->
        <ul class="social-links">
          <li>
            <svg class="icon icon-location" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span>Ho Chi Minh, Vietnam</span>
          </li>
          <li>
            <svg class="icon icon-researchgate" viewBox="0 0 24 24">
              <rect x="2" y="2" width="20" height="20" rx="3" fill="#4c4c4c"/>
              <path d="M5.6 6h3.4c1.1 0 1.9.8 1.9 1.9 0 .8-.5 1.4-1.1 1.7l1.5 3.4H9.7l-1.3-3.1H7.1V13H5.6V6zm1.5 1.4v2.4h1.9c.3 0 .5-.2.5-.5V7.9c0-.3-.2-.5-.5-.5H7.1zm7.5 1.4c0-1 .7-1.7 1.7-1.7s1.7.7 1.7 1.7V11c0 1-.7 1.7-1.7 1.7s-1.7-.7-1.7-1.7V8.8zm1.5 0v2.2c0 .2.1.3.3.3s.3-.1.3-.3V8.8c0-.2-.1-.3-.3-.3s-.3.1-.3.3z" fill="#ffffff"/>
            </svg>
            <a href="https://www.researchgate.net/" target="_blank">ResearchGate</a>
          </li>
          <li>
            <svg class="icon icon-twitter" viewBox="0 0 24 24">
              <rect x="2" y="2" width="20" height="20" rx="3" fill="#1da1f2"/>
              <path d="M20 8.5c-.5.2-1 .4-1.6.5.6-.4 1-1 1.2-1.7-.5.3-1.1.5-1.7.7-.5-.6-1.2-1-2-1-1.6 0-2.8 1.3-2.8 2.8 0 .2 0 .4.1.6-2.3-.1-4.4-1.2-5.8-2.9-.2.4-.4.9-.4 1.4 0 1 .5 1.9 1.3 2.4-.5 0-1-.1-1.4-.4v.1c0 1.4 1 2.5 2.3 2.8-.2.1-.5.1-.8.1-.2 0-.3 0-.5-.1.4 1.2 1.5 2 2.7 2.1-1 1-2.4 1.6-3.9 1.6-.3 0-.5 0-.8-.1 1.3.9 2.9 1.4 4.7 1.4 5.6 0 8.7-4.7 8.7-8.7v-.4c.6-.4 1.1-.9 1.5-1.5z" fill="#ffffff"/>
            </svg>
            <a href="https://x.com/" target="_blank">Twitter</a>
          </li>
          <li>
            <svg class="icon icon-linkedin" viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
            <a href="https://www.linkedin.com/in/tri-ngo-6b2223366/" target="_blank">LinkedIn</a>
          </li>
          <li>
            <svg class="icon icon-github" viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
            <a href="https://github.com/triaxios713" target="_blank">GitHub</a>
          </li>
          <li>
            <svg class="icon icon-scholar" viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.89 12.55a6 6 0 0 0 12.22 0L12 15.82l-6.11-3.27z"/></svg>
            <a href="https://scholar.google.com/citations?user=irorWDoAAAAJ&hl=en&authuser=1" target="_blank">Google Scholar</a>
          </li>
        </ul>
      </div>
    </aside>

    <article class="content">
      {{ content }}
    </article>

  </main>

</body>
</html>
