<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navbar-->
  <header class="navbar-header">
    <nav class="navbar">
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Tri</a>
        <a href="{{ '/projects.html' | relative_url }}" class="nav-link {% if page.url contains 'projects' %}active{% endif %}">Projects</a>
        <a href="{{ '/grants.html' | relative_url }}" class="nav-link {% if page.url contains 'grants' %}active{% endif %}">Grants</a>
        <a href="{{ '/publications.html' | relative_url }}" class="nav-link {% if page.url contains 'publications' %}active{% endif %}">Publications</a>
        <a href="{{ '/talks.html' | relative_url }}" class="nav-link {% if page.url contains 'talks' %}active{% endif %}">Talks</a>
      </div>
    </nav>
  </header>

  <!-- Main container -->
  <main class="container">
    
    <!-- Sidebar thông tin cá nhân -->
    <aside class="sidebar">
      <div class="profile-card">
        <!-- Ảnh đại diện -->
        <img src="{{ '/assets/images/avatar.jpg' | relative_url }}" alt="Profile Photo" class="avatar">
        
        <!-- Tên và mô tả ngắn -->
        <h2 class="profile-name">Tri M. Ngo</h2>
        <p class="profile-title">Student at UIT,<br>Ho Chi Minh, Vietnam.</p>
        
        <!-- Danh sách liên kết với các icon SVG hiện đại -->
        <ul class="social-links">
          <li>
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span>Ho Chi Minh, Vietnam</span>
          </li>
          <li>

          </li>
          <li>
            <svg class="icon" viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>

          <li>

          </li>
          <li>
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.89 12.55a6 6 0 0 0 12.22 0L12 15.82l-6.11-3.27z"/></svg>
            <a href="https://scholar.google.com/" target="_blank">Google Scholar</a>

        </ul>
      </div>
    </aside>

    <article class="content">
      {{ content }}
    </article>

  </main>

</body>
</html>
